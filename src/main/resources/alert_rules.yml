groups:
  - name: monitoring-observability-alerts
    rules:
      - alert: ServiceDown
        expr: up{job="monitoring-observability-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Monitoring-Observability-Service is down
          description: Instance has been unreachable for more than 1 minute.

      - alert: HighHttp5xxRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: High HTTP 5xx rate detected
          description: Error rate is above threshold for 2 minutes.

      - alert: HighJvmMemoryUsage
        expr: (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.85
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: High JVM heap usage
          description: JVM heap utilization is above 85%.

